<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches — WM 2026 Match Centre</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body data-page="matches" data-root="../">

<!-- ── Top bar ──────────────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>
    </svg>
    World Cup 2026
  </div>
  <div class="topbar-right">
    <span id="source-badge">—</span>
    <button id="refresh-btn"><span class="refresh-icon">↻</span> Refresh</button>
  </div>
</div>

<!-- ── Hero + tab nav ───────────────────────────────────────────────────── -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">FIFA World Cup · USA, Canada &amp; Mexico</div>
    <h1 class="hero-title">All<br>Matches</h1>
    <p class="hero-sub" id="last-updated">Loading match data…</p>

    <nav class="tab-nav" role="navigation">
      <a class="tab-btn"          href="overview.html">Overview</a>
      <a class="tab-btn active"   href="matches.html">Matches</a>
      <a class="tab-btn"          href="table.html">Table</a>
      <a class="tab-btn"          href="knockout.html">Knockout</a>
      <a class="tab-btn"          href="stats.html">Stats</a>
    </nav>
  </div>
</div>

<!-- ── Body canvas ──────────────────────────────────────────────────────── -->
<div class="body-canvas">
  <div class="page-inner">
    <div id="status-msg"></div>
    <section class="tab-panel active" id="tab-matches"></section>
  </div>
</div>

<script src="../data/openligadb-wm26-2026.mock.js"></script>
<script src="../scripts/app.js"></script>
</body>
</html>
